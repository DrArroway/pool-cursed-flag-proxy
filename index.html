<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic US Flag - D.C. Reflecting Pool Tracker</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: #fff;
            flex-direction: column;
        }
        canvas {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90vw;
            max-height: 80vh;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="controls" style="margin: 10px auto; max-width: 600px; font-family: monospace; background: #222; color: #fff; padding: 15px; border-radius: 8px; text-align: left; box-sizing: border-box;">
    <h3 style="margin-top: 0; color: #00ff00;">🗺️ Algae Matrix Calibration Panel</h3>
    <div style="margin-bottom: 8px;"><label>Box X (Left/Right): <input type="range" id="boxX" min="0" max="100" value="46"> <span id="valX">46%</span></label></div>
    <div style="margin-bottom: 8px;"><label>Box Y (Up/Down): <input type="range" id="boxY" min="0" max="100" value="45"> <span id="valY">45%</span></label></div>
    <div style="margin-bottom: 8px;"><label>Box Width: <input type="range" id="boxW" min="1" max="100" value="5"> <span id="valW">5%</span></label></div>
    <div style="margin-bottom: 8px;"><label>Box Height: <input type="range" id="boxH" min="1" max="100" value="32"> <span id="valH">32%</span></label></div>
    <label style="margin-top:10px; display:inline-block; cursor:pointer;"><input type="checkbox" id="toggleDebug" checked> Show Raw Camera Feed Overlay</label>
      </div>
    <canvas id="flagCanvas" width="1900" height="1000"></canvas>
    <div id="status">Connecting live feed to D.C. Reflecting Pool webcam...</div>

<script>
const canvas = document.getElementById('flagCanvas');
const ctx = canvas.getContext('2d');
const statusDiv = document.getElementById('status');

let starBackgroundColors = Array.from({length: 50}, () => "#1a2c42");
let rawWebcamImage = null;

// Starting configuration calibrated to your exact screenshot pool area
const config = { 
    x: 0.46,  // Centered at 46%
    y: 0.45,  // Top of pool at 45%
    w: 0.05,  // Squished tight to 5% width
    h: 0.32,  // Extended down 32% height
    debug: true 
};

// Connect the HTML slider elements to our config values
document.getElementById('boxX').addEventListener('input', (e) => { config.x = e.target.value / 100; document.getElementById('valX').textContent = e.target.value + '%'; drawFlag(); });
document.getElementById('boxY').addEventListener('input', (e) => { config.y = e.target.value / 100; document.getElementById('valY').textContent = e.target.value + '%'; drawFlag(); });
document.getElementById('boxW').addEventListener('input', (e) => { config.w = e.target.value / 100; document.getElementById('valW').textContent = e.target.value + '%'; drawFlag(); });
document.getElementById('boxH').addEventListener('input', (e) => { config.h = e.target.value / 100; document.getElementById('valH').textContent = e.target.value + '%'; drawFlag(); });
document.getElementById('toggleDebug').addEventListener('change', (e) => { config.debug = e.target.checked; drawFlag(); });

function updateWebcamData() {
    statusDiv.textContent = "Connecting to live proxy server feed...";
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = "/api/live-frame"; // Grabs the active frame from your proxy script

    img.onload = function() {
        rawWebcamImage = img; // Saves the stream frame so drawFlag can paint the overlay
        statusDiv.textContent = "Live Feed Connected. Canton cells mapped to actual pool pixels.";
        
        // Process the color matrix data
        const sampleCanvas = document.createElement('canvas');
        sampleCanvas.width = img.width;
        sampleCanvas.height = img.height;
        const sCtx = sampleCanvas.getContext('2d');
        sCtx.drawImage(img, 0, 0);

        starBackgroundColors = get50StarColorsFromBoundingBox(sCtx, img.width, img.height);
        drawFlag(); // Run the drawing refresh loop
    };

    img.onerror = function() {
        statusDiv.textContent = "Handshake latency. Retrying connection in 5 seconds...";
        setTimeout(updateWebcamData, 5000);
    };
}

function get50StarColorsFromBoundingBox(sCtx, imgW, imgH) {
    const colors = [];
    
    // Core baseline coordinates (mapped from your current winning sliders)
    const baseStartX = imgW * config.x;
    const baseStartY = imgH * config.y;
    const targetW = imgW * config.w;
    const targetH = imgH * config.h;

    // PERSPECTIVE EXTENSION COEFFICIENT
    // A multiplier of 1.0 means a perfect rectangle.
    // Setting this to 2.5 means the bottom of our matrix grid will be 2.5x WIDER 
    // than the top row, perfectly mirroring the lens's depth perception!
    const perspectiveExpansionFactor = 2.5;

    for (let row = 1; row <= 9; row++) {
        // Calculate how far down the pool we are (0.0 at the top, 1.0 at the bottom)
        const progress = (row - 1) / 8; 

        // Scale the row width dynamically based on perspective depth
        const currentRowWidth = targetW * (1 + progress * (perspectiveExpansionFactor - 1));
        
        // Shift the row's starting X coordinate to the left so it expands outwards evenly from the center line
        const widthDifference = currentRowWidth - targetW;
        const rowStartX = baseStartX - (widthDifference / 2);

        // Grid tracking spacing for this SPECIFIC row depth
        const xSpacing = currentRowWidth / 12;
        const ySpacing = targetH / 10;

        const isEvenRow = (row % 2 === 0);
        const starsInRow = isEvenRow ? 5 : 6;
        const starRowLeftEdge = rowStartX + (isEvenRow ? xSpacing * 2 : xSpacing);

        const pixelY = Math.floor(baseStartY + (row * ySpacing));

        for (let col = 0; col < starsInRow; col++) {
            const pixelX = Math.floor(starRowLeftEdge + (col * xSpacing * 2));

            // Guard rails to keep sampling coordinates from leaping off screen borders
            const safeX = Math.max(0, Math.min(imgW - 1, pixelX));
            const safeY = Math.max(0, Math.min(imgH - 1, pixelY));

            try {
                const pixel = sCtx.getImageData(safeX, safeY, 1, 1).data;
                colors.push(`rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`);
            } catch(e) {
                colors.push("#1a2c42");
            }
        }
    }
    return colors;
}

function drawFlag() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Draw Stripes
    const stripeHeight = canvas.height / 13;
    for (let i = 0; i < 13; i++) {
        ctx.fillStyle = (i % 2 === 0) ? "#b22234" : "#ffffff";
        ctx.fillRect(0, i * stripeHeight, canvas.width, stripeHeight);
    }

    // 2. Draw Canton
    const cantonWidth = canvas.width * 0.4;
    const cantonHeight = stripeHeight * 7;
    ctx.fillStyle = "#1a2c42";
    ctx.fillRect(0, 0, cantonWidth, cantonHeight);

    // 3. Draw Camera Underlay (The Overlay you were missing!)
    if (config.debug && rawWebcamImage) {
        ctx.save();
        ctx.globalAlpha = 0.75;
        ctx.drawImage(rawWebcamImage, 0, 0, cantonWidth, cantonHeight);
        ctx.restore();
    }

    // 4. Sample colors live if sliders move
    if (rawWebcamImage) {
        const sampleCanvas = document.createElement('canvas');
        sampleCanvas.width = rawWebcamImage.width;
        sampleCanvas.height = rawWebcamImage.height;
        const sCtx = sampleCanvas.getContext('2d');
        sCtx.drawImage(rawWebcamImage, 0, 0);
        starBackgroundColors = get50StarColorsFromBoundingBox(sCtx, rawWebcamImage.width, rawWebcamImage.height);
    }

    // 5. Draw Stars & Crosshairs
    const xSpacing = cantonWidth / 12;
    const ySpacing = cantonHeight / 10;
    let starIndex = 0;

    for (let row = 1; row <= 9; row++) {
        const isEvenRow = (row % 2 === 0);
        const starsInRow = isEvenRow ? 5 : 6;
        const startX = isEvenRow ? xSpacing * 2 : xSpacing;

        for (let col = 0; col < starsInRow; col++) {
            const x = startX + (col * xSpacing * 2);
            const y = row * ySpacing;
            const starBgColor = starBackgroundColors[starIndex] || "#1a2c42";
            starIndex++;

            // Draw solid color patch blocks for verification
            ctx.fillStyle = starBgColor;
            ctx.fillRect(x - 10, y - 10, 20, 20);

            // Draw crosshairs
            if (config.debug) {
                ctx.save();
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x - 5, y); ctx.lineTo(x + 5, y);
                ctx.moveTo(x, y - 5); ctx.lineTo(x, y + 5);
                ctx.stroke();
                ctx.restore();
            }
        }
    }

    // 6. Draw Green Bounding Box Target
    // 6. Draw Green Trapezoid Perspective Frame
    if (config.debug) {
        ctx.save();
        ctx.strokeStyle = "#00ff00";
        ctx.lineWidth = 2;
        
        const cW = cantonWidth;
        const cH = cantonHeight;
        const pExpand = 2.5; // Must match the value in the sampler function above!

        // Top Left, Top Right, Bottom Right, Bottom Left coordinates
        const tlX = cW * config.x;
        const trX = tlX + (cW * config.w);
        const topY = cH * config.y;
        
        const bottomW = (cW * config.w) * pExpand;
        const wDiff = bottomW - (cW * config.w);
        const blX = tlX - (wDiff / 2);
        const brX = blX + bottomW;
        const bottomY = topY + (cH * config.h);

        ctx.beginPath();
        ctx.moveTo(tlX, topY);
        ctx.lineTo(trX, topY);
        ctx.lineTo(brX, bottomY);
        ctx.lineTo(blX, bottomY);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }
}

// Initial Boot
updateWebcamData();
setInterval(updateWebcamData, 60000); // Polling update every 60 seconds
</script>

</body>
</html>
